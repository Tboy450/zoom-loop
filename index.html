<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Zoom Loop</title>
    <meta name="description" content="Create recursive photo zoom loops from images on your phone or computer.">
    <meta name="theme-color" content="#101112">
    <meta name="application-name" content="Zoom Loop">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Zoom Loop">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Zoom loop preview">
        <div class="stage-top">
          <div>
            <h1>Zoom Loop</h1>
            <p id="statusText">Empty stack</p>
          </div>
          <div class="transport">
            <button id="installButton" class="is-hidden" type="button">Install</button>
            <button id="playButton" type="button">Play</button>
            <button id="shareButton" type="button">Share</button>
            <button id="pngButton" type="button">PNG</button>
            <button id="webmButton" type="button">Video</button>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="previewCanvas" width="1080" height="1080"></canvas>
          <button id="stagePlayButton" class="stage-play-button" type="button" aria-label="Play loop">
            <span class="stage-play-icon" aria-hidden="true"></span>
          </button>
        </div>

        <div class="timeline">
          <input id="timelineInput" type="range" min="0" max="1000" value="0" aria-label="Timeline">
          <span id="timeReadout">0%</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="Controls">
        <label class="upload-drop" id="dropZone">
          <input id="fileInput" type="file" accept="image/*,.jpg,.jpeg,.png,.webp,.gif,.bmp,.avif,.heic,.heif,.tif,.tiff" multiple aria-label="Add images">
          <span class="upload-copy" aria-hidden="true">
            <strong>Add Images</strong>
            <small>JPG PNG WebP HEIC</small>
          </span>
        </label>
        <p id="uploadHelp" class="upload-help" aria-live="polite"></p>

        <div class="sample-row">
          <button id="sampleButton" type="button">Sample Set</button>
          <button id="clearButton" type="button">Clear</button>
        </div>

        <section class="panel-section">
          <h2>Image Stack</h2>
          <ol id="imageList" class="image-list"></ol>
        </section>

        <section class="panel-section">
          <h2>Render</h2>

          <label class="field">
            <span>Canvas</span>
            <select id="sizeInput">
              <option value="720">720</option>
              <option value="1080" selected>1080</option>
              <option value="1440">1440</option>
              <option value="2160">2160</option>
            </select>
          </label>

          <label class="field">
            <span>Frames</span>
            <input id="framesInput" type="number" min="24" max="240" step="6" value="90">
          </label>

          <label class="field">
            <span>FPS</span>
            <input id="fpsInput" type="number" min="12" max="60" step="1" value="30">
          </label>

          <label class="field slider-field">
            <span>Zoom speed</span>
            <input id="zoomRateInput" type="range" min="25" max="250" value="100">
          </label>
        </section>

        <section class="panel-section">
          <h2>Recursive Portal</h2>

          <label class="field slider-field">
            <span>Patch size</span>
            <input id="patchInput" type="range" min="8" max="34" value="17">
          </label>

          <label class="field toggle-field">
            <span>Auto place</span>
            <input id="autoAnchorInput" type="checkbox">
          </label>

          <label class="field slider-field">
            <span>Anchor X</span>
            <input id="anchorXInput" type="range" min="18" max="82" value="52">
          </label>

          <label class="field slider-field">
            <span>Anchor Y</span>
            <input id="anchorYInput" type="range" min="18" max="82" value="48">
          </label>

          <label class="field slider-field">
            <span>Color bind</span>
            <input id="bindInput" type="range" min="0" max="100" value="72">
          </label>

          <label class="field slider-field">
            <span>Sample blend</span>
            <input id="sampleBlendInput" type="range" min="0" max="100" value="55">
          </label>

          <label class="field slider-field">
            <span>Edge blend</span>
            <input id="edgeBlendInput" type="range" min="0" max="100" value="68">
          </label>

          <label class="field slider-field">
            <span>Shape morph</span>
            <input id="shapeMorphInput" type="range" min="0" max="100" value="70">
          </label>

          <label class="field slider-field">
            <span>Pixel grain</span>
            <input id="grainInput" type="range" min="0" max="100" value="36">
          </label>

          <label class="field slider-field">
            <span>Symmetry</span>
            <input id="symmetryInput" type="range" min="1" max="8" value="1">
          </label>

          <label class="field slider-field">
            <span>Alignment</span>
            <input id="alignmentInput" type="range" min="0" max="360" value="0">
          </label>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
